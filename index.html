<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTweak Repository - iOS 插件源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .repo-url {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            color: #333;
            margin: 20px 0;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 5px;
        }
        .instructions {
            text-align: left;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .instructions h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .instructions ol { margin-left: 20px; color: #555; line-height: 1.8; }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            color: #856404;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 MyTweak Repository</h1>
        <p class="subtitle">iOS 插件源 - 支持 Rootless</p>
        <div class="repo-url" id="repoUrl">https://fengyunyongjie.github.io/mytweak/</div>
        <div>
            <span class="badge">Rootless</span>
            <span class="badge">iOS 15-18</span>
        </div>
        <div class="instructions">
            <h3>📥 添加方法</h3>
            <ol>
                <li>打开 Cydia 或 Sileo</li>
                <li>点击「来源」→「编辑」→「添加」</li>
                <li>输入上方地址并添加</li>
                <li>回到「来源」搜索安装插件</li>
            </ol>
        </div>
        <div class="note">
            ℹ️ 更新时间: $(date -u +"%Y-%m-%d %H:%M UTC")
        </div>
    </div>
    <script>
        document.getElementById('repoUrl').textContent = window.location.href;
    </script>
</body>
</html>
